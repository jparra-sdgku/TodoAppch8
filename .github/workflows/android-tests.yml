name: Run Android Tests
on: push

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check code
        uses : actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test